

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We Are Down</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #2a0000, #050505 60%);
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      position: relative;
    }
    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      background: #ff1f1f;
      filter: blur(160px);
      opacity: 0.35;
      animation: pulse 4s infinite alternate;
    }
    .card {
      position: relative;
      z-index: 2;
      max-width: 720px;
      padding: 50px 35px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: 0 0 60px rgba(255,0,0,0.2);
      animation: float 4s ease-in-out infinite;
    }
    .icon {
      width: 95px;
      height: 95px;
      margin: 0 auto 25px;
      border-radius: 50%;
      border: 3px solid #ff3030;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      color: #ff3030;
      animation: rotate 3s linear infinite;
      box-shadow: 0 0 35px rgba(255,48,48,0.7);
    }
    h1 {
      font-size: clamp(38px, 8vw, 76px);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 18px;
      background: linear-gradient(90deg, #fff, #ff3b3b, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200%;
      animation: shine 3s linear infinite;
    }
    p {
      font-size: clamp(16px, 3vw, 22px);
      color: #d8d8d8;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .loader {
      width: 220px;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      margin: 0 auto;
      overflow: hidden;
    }
    .loader span {
      display: block;
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, transparent, #ff3030, transparent);
      animation: loading 1.4s infinite;
    }
    .particles span {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #ff3030;
      border-radius: 50%;
      opacity: 0.7;
      animation: rise 8s linear infinite;
    }
    .particles span:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particles span:nth-child(2) { left: 25%; animation-delay: 1s; }
    .particles span:nth-child(3) { left: 45%; animation-delay: 2s; }
    .particles span:nth-child(4) { left: 65%; animation-delay: 3s; }
    .particles span:nth-child(5) { left: 85%; animation-delay: 4s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
    @keyframes pulse {
      from { transform: scale(0.9); opacity: 0.25; }
      to { transform: scale(1.2); opacity: 0.45; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes shine {
      from { background-position: 0%; }
      to { background-position: 200%; }
    }
    @keyframes loading {
      from { transform: translateX(-100%); }
      to { transform: translateX(230%); }
    }
    @keyframes rise {
      from {
        bottom: -20px;
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      30% { opacity: 1; }
      to {
        bottom: 110%;
        transform: translateY(-100px) scale(1.8);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="glow"></div>
    <div class="particles">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="card">
      <div class="icon">⚙</div>
      <h1>Sorry, We Are Down</h1>
      <p>
        Our website is currently under maintenance.<br>
        We are working hard to bring everything back online soon.
      </p>
      <div class="loader">
        <span></span>
      </div>
    </div>
  </div>
</body>
</html>
